<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRRT: Tactical Air Combat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Sidebar HUD -->
        <div id="hud-left" class="hud-panel glass-panel">
            <h1>BRRT</h1>
            <div class="turn-indicator" id="turn-indicator">
                <span class="player-turn active">PLANNING PHASE</span>
            </div>
            
            <div id="unit-info" class="hidden">
                <h2 id="ui-unit-name">A-10 Warthog</h2>
                <div class="stat-row">
                    <span>HP</span>
                    <div class="bar-container"><div id="ui-hp-bar" class="bar-fill hp-fill"></div></div>
                    <span id="ui-hp-val">100/100</span>
                </div>
                <div class="stat-row">
                    <span>NRG</span>
                    <div class="bar-container"><div id="ui-energy-bar" class="bar-fill energy-fill"></div></div>
                    <span id="ui-energy-val">2/2</span>
                </div>
                
                <div class="controls-section">
                    <h3>Flight Action</h3>
                    <div class="radio-group" id="flight-actions">
                        <label class="radio-label"><input type="radio" name="flight" value="level" checked> Level (0)</label>
                        <label class="radio-label"><input type="radio" name="flight" value="recover"> Recover (+1)</label>
                        <label class="radio-label"><input type="radio" name="flight" value="maneuver"> Maneuver (-1)</label>
                        <label class="radio-label"><input type="radio" name="flight" value="boost"> Boost (-1)</label>
                        <label class="radio-label"><input type="radio" name="flight" value="turnaround"> Turnaround (-2)</label>
                    </div>
                </div>

                <div class="controls-section">
                    <h3>Weapon Systems</h3>
                    <div class="radio-group" id="weapon-systems">
                        <label class="radio-label"><input type="radio" name="weapon" value="cannons" checked> Cannons (Auto)</label>
                        <label class="radio-label"><input type="radio" name="weapon" value="missile"> Missile (<span id="ui-ammo-missile">2</span>)</label>
                        <label class="radio-label"><input type="radio" name="weapon" value="flares"> Flares (<span id="ui-ammo-flares">3</span>)</label>
                    </div>
                </div>
                
                <p id="context-hint" class="hint-text">Click within movement cone to set waypoint.</p>
            </div>
            
            <div class="game-controls">
                <button id="btn-commit-turn" class="primary-btn">Commit Turn</button>
                <button id="btn-replay" class="secondary-btn hidden">Watch Replay</button>
            </div>
        </div>

        <!-- Main Game Area -->
        <div id="canvas-container">
            <canvas id="gameCanvas" width="800" height="800"></canvas>
            <div id="combat-text-container"></div>
        </div>
        
        <!-- Right Panel -->
        <div id="hud-right" class="hud-panel glass-panel">
            <h2>Combat Log</h2>
            <div id="combat-log" class="log-container">
                <p>Welcome to BRRT Tactical Command.</p>
                <p>Commander, plan your squadron's maneuvers.</p>
            </div>
        </div>
        
        <!-- Game Over overlay -->
        <div id="game-over-overlay" class="overlay hidden">
            <div class="overlay-content glass-panel">
                <h1 id="game-over-title">MISSION ACCOMPLISHED</h1>
                <p id="game-over-message">All enemy forces neutralized.</p>
                <button id="btn-restart" class="primary-btn">Restart Mission</button>
            </div>
        </div>
    </div>

    <script src="entities.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
